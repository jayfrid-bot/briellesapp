<!-- This is index.html — the FRONT DOOR of your website. -->
<!-- Anything between < and > is called a "tag". Tags are like LEGO bricks. -->
<!-- These grey notes (like this line) are called COMMENTS. The computer ignores them. -->

<!DOCTYPE html>
<html>

  <head>
    <title>Biology Study App</title>
    <link rel="stylesheet" href="style.css">   <!-- connects the PRETTY file -->
  </head>

  <body>

    <!-- The Home button floats in the corner. It hides on the very first screen. -->
    <button id="home-button" class="home-button hidden" onclick="showScreen('start-screen')">🏠 Home</button>


    <!-- ===== SCREEN 1: the START screen ===== -->
    <!-- A "screen" is one page of the app (like a backdrop in Scratch). -->
    <div id="start-screen" class="screen">
      <h1>Biology Study App</h1>
      <!-- When clicked, this runs showScreen() and jumps to the home screen. -->
      <button class="enter-button" onclick="showScreen('home-screen')">Enter</button>
    </div>


    <!-- ===== SCREEN 2: the HOME screen (6 animal groups) ===== -->
    <!-- class="screen hidden" means it starts HIDDEN until we click Enter. -->
    <div id="home-screen" class="screen hidden">
      <h1>Pick an Animal Group</h1>

      <!-- These 6 SQUARE picture-cards sit in a grid (rows and columns). -->
      <!-- Each card has a big animal on top and its name underneath. -->
      <div class="button-grid">
        <button class="category-button"><span class="cat-pic">🐱</span><span class="cat-name">Felines</span></button>
        <button class="category-button"><span class="cat-pic">🐶</span><span class="cat-name">Canines</span></button>
        <button class="category-button"><span class="cat-pic">🐸</span><span class="cat-name">Amphibians</span></button>
        <button class="category-button"><span class="cat-pic">🦎</span><span class="cat-name">Reptiles</span></button>
        <button class="category-button"><span class="cat-pic">🐦</span><span class="cat-name">Birds</span></button>
        <button class="category-button"><span class="cat-pic">🐹</span><span class="cat-name">Small Pets</span></button>
      </div>
    </div>


    <!-- Load our JavaScript LAST (the BRAIN that makes buttons work). -->
    <script src="app.js"></script>

  </body>
</html>
