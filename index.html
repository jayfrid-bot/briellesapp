<!-- This is index.html — the FRONT DOOR of your website. -->
<!-- Anything between < and > is called a "tag". Tags are like LEGO bricks. -->
<!-- These grey notes (like this line) are called COMMENTS. The computer ignores them. -->

<!DOCTYPE html>            <!-- This line just means "Hey browser, this is a web page!" -->
<html>                     <!-- Everything on the page goes inside <html> ... </html> -->

  <head>                   <!-- The "head" holds SETUP info you don't see on the page -->
    <title>Biology Study App</title>          <!-- The words shown on the browser TAB -->
    <link rel="stylesheet" href="style.css">  <!-- This connects our PRETTY file (style.css) -->
  </head>

  <body>                   <!-- The "body" holds everything you DO see on the page -->

    <h1>Biology Study App</h1>   <!-- h1 = our big centered heading -->

    <!-- A button. class="enter-button" tells CSS to make it a rounded square. -->
    <button class="enter-button">Enter</button>

  </body>
</html>
