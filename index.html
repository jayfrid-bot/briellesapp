<!-- This is index.html — the FRONT DOOR of your website. -->
<!-- Anything between < and > is called a "tag". Tags are like LEGO bricks. -->
<!-- These grey notes (like this line) are called COMMENTS. The computer ignores them. -->

<!DOCTYPE html>
<html>

  <head>
    <title>Biology Study App</title>
    <link rel="stylesheet" href="style.css">   <!-- connects the PRETTY file -->
  </head>

  <body>

    <!-- Faint decoration leaves in the corners (just for the jungle look). -->
    <div class="leaves">
      <span>🌿</span><span>🍃</span><span>🌴</span><span>🌿</span>
    </div>

    <!-- The Home + Back buttons float in the top-left corner. -->
    <div class="topbar">
      <button id="home-button" class="navbtn home-button hidden" onclick="goHome()">🏠 Home</button>
      <button id="back-button" class="navbtn back-button hidden" onclick="goBack()">⬅ Back</button>
    </div>


    <!-- ===== SCREEN 1: the START screen ===== -->
    <!-- A "screen" is one page of the app (like a backdrop in Scratch). -->
    <div id="start-screen" class="screen">
      <h1>🌿 Biology Study App 🌿</h1>

      <!-- The age picker. A <select> is a DROPDOWN box. -->
      <!-- The options (4 to 60) are added by JavaScript, not typed by hand. -->
      <!-- onchange runs setAge() whenever you pick a new age. -->
      <div class="age-box">
        <label for="age-picker">How old are you?</label><br>
        <select id="age-picker" onchange="setAge()"></select>
      </div>

      <!-- When clicked, this runs showScreen() and jumps to the home screen. -->
      <button class="enter-button" onclick="showScreen('home-screen')">Enter</button>
    </div>


    <!-- ===== SCREEN 2: the HOME screen (6 animal groups) ===== -->
    <!-- class="screen hidden" means it starts HIDDEN until we click Enter. -->
    <div id="home-screen" class="screen hidden">
      <h1>🐾 Pick an Animal Group 🐾</h1>

      <!-- These 6 SQUARE picture-cards sit in a grid (rows and columns). -->
      <!-- onclick runs openCategory() with the group's id, opening its animals. -->
      <div class="button-grid">
        <button class="category-button" onclick="openCategory('felines')"><span class="cat-pic">🐱</span><span class="cat-name">Felines</span></button>
        <button class="category-button" onclick="openCategory('canines')"><span class="cat-pic">🐶</span><span class="cat-name">Canines</span></button>
        <button class="category-button" onclick="openCategory('amphibians')"><span class="cat-pic">🐸</span><span class="cat-name">Amphibians</span></button>
        <button class="category-button" onclick="openCategory('reptiles')"><span class="cat-pic">🦎</span><span class="cat-name">Reptiles</span></button>
        <button class="category-button" onclick="openCategory('birds')"><span class="cat-pic">🐦</span><span class="cat-name">Birds</span></button>
        <button class="category-button" onclick="openCategory('smallpets')"><span class="cat-pic">🐹</span><span class="cat-name">Small Pets</span></button>
      </div>
    </div>


    <!-- ===== SCREEN 3: the ANIMALS screen (the 10 animals in a group) ===== -->
    <!-- JavaScript fills these in for us, so they start EMPTY. -->
    <div id="category-screen" class="screen hidden">
      <h1 id="category-title">Animals</h1>
      <div id="animal-list" class="button-grid"></div>
    </div>


    <!-- ===== SCREEN 4: the SKELETON screen ===== -->
    <div id="skeleton-screen" class="screen hidden">
      <h1 id="skeleton-title">Skeleton</h1>
      <p class="hint">👆 Tap a part to explore inside it!</p>

      <!-- The breadcrumb trail (Cat › Head › Teeth) — built by anatomy.js. -->
      <div id="anatomy-crumb-flat" class="crumb-bar"></div>

      <!-- The diagram: the picture, with clickable dots on top of it. -->
      <!-- It has id="diagram" so anatomy.js can hide it on levels with no picture. -->
      <div id="diagram" class="diagram">
        <img id="skeleton-img" class="layer" src="" alt="animal skeleton">
        <div id="dots-layer"></div>   <!-- JavaScript adds the dots in here -->
      </div>

      <!-- The tap-in MENU of sub-parts — built by anatomy.js. -->
      <div id="anatomy-menu-flat" class="button-grid anatomy-menu"></div>

      <!-- This button (shown only when the animal has 3D) opens the 3D view. -->
      <button id="view3d-button" class="flat-button hidden" onclick="open3DSkeleton(currentAnimal)">🔄 See it in 3D</button>

      <!-- Thank-you credit for the free skeleton drawing (required by its license). -->
      <p class="credit">Cat skeleton by Przemek Maksim · Wikimedia Commons · CC BY-SA 3.0</p>
    </div>


    <!-- ===== SCREEN 5: the 3D SKELETON screen ===== -->
    <div id="skeleton3d-screen" class="screen hidden">
      <h1 id="skeleton3d-title">3D Skeleton</h1>
      <p id="hint3d" class="hint">🖱️ Drag to spin • tap a part below to explore inside it!</p>

      <!-- The SAME breadcrumb, 3D copy. -->
      <div id="anatomy-crumb-3d" class="crumb-bar"></div>

      <div id="canvas3d-holder">
        <div id="loading3d" class="hidden">Loading 3D… 🦴</div>   <!-- shows while the model loads -->
      </div>

      <!-- The SAME sub-part menu, 3D copy (no dots — the model is one solid piece). -->
      <div id="anatomy-menu-3d" class="button-grid anatomy-menu"></div>

      <button class="flat-button" onclick="openFlatSkeleton()">📄 Flat view</button>
    </div>


    <!-- ===== The bone POPUP (hidden until you tap a dot) ===== -->
    <div id="popup" class="popup hidden">
      <div class="popup-box">
        <button class="popup-close" onclick="closePopup()">✖</button>
        <h2 id="popup-name">Bone</h2>
        <p id="popup-parent" class="popup-parent hidden"></p>   <!-- "Part of: Head" -->
        <p id="popup-say">Say it: ...</p>
        <button class="speak-button" onclick="speakBone()">🔊 Hear it</button>
        <p id="popup-desc">...</p>
        <p id="popup-fun" class="popup-fun hidden"></p>          <!-- 🌟 fun fact -->
      </div>
    </div>


    <!-- Load the DATA first (it makes the DATA box), THEN the brain that uses it. -->
    <script src="data.js"></script>
    <!-- The body EXPLORER (drill-down menus + breadcrumb). -->
    <script src="anatomy.js"></script>
    <!-- The 3D helper (three.js) + the part that spins/zooms it. -->
    <script src="libs/three.min.js"></script>
    <script src="libs/OrbitControls.js"></script>
    <script src="libs/GLTFLoader.js"></script>
    <script src="skeleton3d.js"></script>
    <script src="app.js"></script>

  </body>
</html>
